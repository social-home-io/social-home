name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Run tests with branch coverage
        # Target 90% per §27.5 ("coverage gate"). Current baseline at
        # v1.0.0 is 83% — ratchet upward as modules get targeted tests.
        # Do not lower this number; add missing tests instead.
        run: |
          pytest --cov=social_home --cov-branch --cov-fail-under=80 --tb=short -q

      - name: Run protocol/security tests (release blocker)
        run: |
          pytest tests/protocol/ -m security --tb=short -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install ruff
      - name: ruff check
        run: ruff check social_home/ tests/
      - name: ruff format
        run: ruff format --check social_home/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: pip install -e .[dev]
      - name: mypy
        run: mypy social_home/

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install
        working-directory: client
        run: pnpm install --frozen-lockfile
      - name: Build
        working-directory: client
        run: pnpm run build
      - name: Typecheck
        working-directory: client
        run: pnpm run typecheck
      - name: i18n key check (§30.5)
        working-directory: client
        run: pnpm run i18n:check
      - name: Vitest
        working-directory: client
        run: pnpm run test
